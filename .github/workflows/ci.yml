name: CI/CD Pipeline Test
on:
  push:
    branches: [ "main" ]
jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - run: flake8 . --format=html --htmldir=flake8_report || true
    - run: pytest --html=pytest_report.html --self-contained-html
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-html-report
        path: pytest_report.html
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: flake8-html-report
        path: flake8_report/
